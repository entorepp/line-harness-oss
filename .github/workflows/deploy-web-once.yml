name: Deploy Web Once

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @line-crm/shared build

      - name: Build web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: https://line-flattravel.flat-travel.workers.dev

      - name: Verify bundle
        run: |
          set -euo pipefail
          grep -R -l '⌘+Enterで送信' apps/web/out/_next/static/chunks/app/chats
          if grep -R -q '入力中ローディング' apps/web/out/_next/static/chunks; then
            exit 1
          fi

      - name: Deploy Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy out --project-name=line-crm-web --branch=main

      - name: Verify production
        run: |
          set -euo pipefail
          base='https://line-crm-web-2ob.pages.dev'
          for attempt in $(seq 1 12); do
            html="$(curl -fsSL "$base/chats" || true)"
            chunk="$(printf '%s' "$html" | grep -o '/_next/static/chunks/app/chats/page-[^"]*\.js' | head -n 1 || true)"
            if [ -n "$chunk" ]; then
              js="$(curl -fsSL "$base$chunk" || true)"
              if printf '%s' "$js" | grep -q '⌘+Enterで送信' && ! printf '%s' "$js" | grep -q '入力中ローディング'; then
                exit 0
              fi
            fi
            sleep 5
          done
          exit 1
